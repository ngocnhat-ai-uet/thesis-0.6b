job_type: sft
experiment_id: TN02_sft
run_id: tn02_le2000_sft_hard
output_root: experiments
dataset:
  labeled_path: data/sft/le2000_hard.json
  system_prompt: You are a careful mathematical reasoning assistant. Before responding,
    reason in <think>...</think>. Use it to understand the task, identify relevant
    constraints, reason logically, verify key steps, and correct mistakes when found.
    Then respond clearly and follow the user's instructions.
  seed: 9
models:
  student: experiments/TN02_sft/runs/tn02_le2000_sft_easy
training:
  output_dir: experiments/TN02_sft/runs/tn02_le2000_sft_hard
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 24
  gradient_checkpointing: true
  max_length: 2048
  dataset_kwargs:
    skip_prepare_dataset: true
  save_strategy: 'no'
  logging_steps: 1
  include_num_input_tokens_seen: true
  learning_rate: 1.0e-05
  weight_decay: 0.05
  warmup_ratio: 0.05
  lr_scheduler_type: cosine
  optim: adamw_bnb_8bit
